name: CI

# Gate every PR to main (and pushes to main) on the same checks the v0 build ran
# locally: typecheck, lint, the vitest suite, and a production build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Project baseline (README "Node.js 20+"); matches engines in package.json.
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # The dashboard renders an onboarding state without Brewfather credentials,
      # and the data routes are force-dynamic (env read at request time), so the
      # build needs no BF_USER_ID / BF_API_KEY.
      - name: Build
        run: npm run build
